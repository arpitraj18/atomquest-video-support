server {
    listen 80;
    server_name support.yourdomain.com; # Replace with your domain

    # Serve the static compiled frontend
    location / {
        root /var/www/atomquest/web/dist; # Replace with your actual path
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addressee;
    }

    # Proxy WebSocket (Socket.io) requests to Node.js backend
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
